openapi: 3.0.0
info:
  title: Track My Tasks API
  description: |
    API specification for Track My Tasks service.
  version: 0.0.0
  license:
    name: AGPL-3.0
    url: https://opensource.org/licenses/AGPL-3.0

servers:
  - url: https://api.trackmytasks.org/v1
    description: Public SaaS instance
  - url: https://staging-api.trackmytasks.org/v1
    description: Staging instance
  - url: http://localhost:8080/v1
    description: Development instance

tags:
  - name: Tasks
    description: Defines endpoints for creating, updating, removing tasks and templates.
  - name: Scheduling
    description: Defines endpoints for showing current schedule.
  - name: Grouping
    description: Defines endpoints for grouping templates via tag system.

paths:
  /tasks/templates:
    get:
      tags:
        - Tasks
      summary: Get all task templates
      description: Returns paginated collection of task templates
      operationId: getTemplates
      parameters:
        - $ref: "#/components/parameters/PaginationPage"
        - $ref: "#/components/parameters/PaginationLimit"
        - $ref: "#/components/parameters/SortingOrder"
        - in: query
          name: sort-field
          schema:
            $ref: "#/components/schemas/TemplateSortableField"
          description: By which field results are sorted
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Template'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
              examples:
                empty:
                  $ref: "#/components/examples/EmptyCollectionExample"
                collection:
                  $ref: "#/components/examples/TemplatesCollectionExample"
        '400':
          $ref: "#/components/responses/BadRequest"
        '405':
          $ref: "#/components/responses/MethodNotAllowed"
        '500':
          $ref: "#/components/responses/ServerError"

    post:
      tags:
        - Tasks
      summary: Create a template
      operationId: createTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemplateBody'
            examples:
              create_template:
                $ref: "#/components/examples/CreateTemplateExample"
      responses:
        '201':
          description: Resource created
          headers:
            Location:
              schema:
                type: string
              description: URL of the created task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
              examples:
                default:
                  $ref: "#/components/examples/TemplateExample"
        '400':
          $ref: "#/components/responses/BadRequest"
        '405':
          $ref: "#/components/responses/MethodNotAllowed"
        '500':
          $ref: "#/components/responses/ServerError"

  /tasks/templates/{template_id}:
    get:
      tags:
        - Tasks
      summary: Get template by id
      operationId: getTemplateById
      parameters:
        - in: path
          name: template_id
          required: true
          schema:
            type: integer
            minimum: 1
          description: Id of the template
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
              examples:
                default:
                  $ref: "#/components/examples/TemplateExample"
        '400':
          $ref: "#/components/responses/BadRequest"
        '404':
          $ref: "#/components/responses/NotFound"
        '405':
          $ref: "#/components/responses/MethodNotAllowed"
        '500':
          $ref: "#/components/responses/ServerError"

    patch:
      tags:
        - Tasks
      summary: Update the template
      operationId: updateTemplate
      parameters:
        - in: path
          name: template_id
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemplateBody'
            examples:
              default:
                $ref: "#/components/examples/CreateTemplateExample"
      responses:
        '200':
          description: Template updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
              examples:
                default:
                  $ref: "#/components/examples/TemplateExample"
        '400':
          $ref: "#/components/responses/BadRequest"
        '404':
          $ref: "#/components/responses/NotFound"
        '405':
          $ref: "#/components/responses/MethodNotAllowed"
        '500':
          $ref: "#/components/responses/ServerError"

    delete:
      tags:
        - Tasks
      summary: Remove the template
      operationId: deleteTemplate
      parameters:
        - in: path
          name: template_id
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '204':
          description: Template removed successfully
        '400':
          $ref: "#/components/responses/BadRequest"
        '404':
          $ref: "#/components/responses/NotFound"
        '405':
          $ref: "#/components/responses/MethodNotAllowed"
        '500':
          $ref: "#/components/responses/ServerError"

  /tasks/tasks:
    get:
      tags:
        - Tasks
      summary: Get all tasks
      description: Returns paginated collection of tasks
      operationId: getTasks
      parameters:
        - $ref: "#/components/parameters/PaginationPage"
        - $ref: "#/components/parameters/PaginationLimit"
        - $ref: "#/components/parameters/SortingOrder"
        - in: query
          name: sort-field
          schema:
            $ref: "#/components/schemas/TaskSortableField"
          description: By which field results are sorted
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
              examples:
                empty:
                  $ref: "#/components/examples/EmptyCollectionExample"
                collection:
                  $ref: "#/components/examples/TasksCollectionExample"
        '400':
          $ref: "#/components/responses/BadRequest"
        '405':
          $ref: "#/components/responses/MethodNotAllowed"
        '500':
          $ref: "#/components/responses/ServerError"

  /tasks/tasks/{task_id}:
    get:
      tags:
        - Tasks
      summary: Get task by id
      operationId: getTaskById
      parameters:
        - in: path
          name: task_id
          required: true
          schema:
            type: integer
            minimum: 1
          description: Id of the task
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
              examples:
                default:
                  $ref: "#/components/examples/TaskExample"
        '400':
          $ref: "#/components/responses/BadRequest"
        '404':
          $ref: "#/components/responses/NotFound"
        '405':
          $ref: "#/components/responses/MethodNotAllowed"
        '500':
          $ref: "#/components/responses/ServerError"

    patch:
      tags:
        - Tasks
      summary: Update the task
      operationId: updateTask
      parameters:
        - in: path
          name: task_id
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/RunningTaskBody"
                - $ref: "#/components/schemas/FinishedTaskBody"
                - $ref: "#/components/schemas/CancelledTaskBody"
                - $ref: "#/components/schemas/MovedTaskBody"
              discriminator:
                propertyName: status
                mapping:
                  running: "#/components/schemas/RunningTaskBody"
                  finished: "#/components/schemas/FinishedTaskBody"
                  cancelled: "#/components/schemas/CancelledTaskBody"
                  moved: "#/components/schemas/MovedTaskBody"
            examples:
              running:
                $ref: "#/components/examples/UpdateTaskRunningExample"
              finished:
                $ref: "#/components/examples/UpdateTaskFinishedExample"
              cancelled:
                $ref: "#/components/examples/UpdateTaskCancelledExample"
              moved:
                $ref: "#/components/examples/UpdateTaskMovedExample"

      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
              examples:
                default:
                  $ref: "#/components/examples/TaskExample"
        '400':
          $ref: "#/components/responses/BadRequest"
        '404':
          $ref: "#/components/responses/NotFound"
        '405':
          $ref: "#/components/responses/MethodNotAllowed"
        '500':
          $ref: "#/components/responses/ServerError"

    delete:
      tags:
        - Tasks
      summary: Remove the task
      operationId: deleteTask
      parameters:
        - in: path
          name: task_id
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '204':
          description: Resource removed
        '400':
          $ref: "#/components/responses/BadRequest"
        '404':
          $ref: "#/components/responses/NotFound"
        '405':
          $ref: "#/components/responses/MethodNotAllowed"
        '500':
          $ref: "#/components/responses/ServerError"

  /grouping/tags:
    get:
      tags:
        - Grouping
      summary: Get all tags
      description: Returns paginated collection of tags
      operationId: getTags
      parameters:
        - $ref: "#/components/parameters/PaginationPage"
        - $ref: "#/components/parameters/PaginationLimit"
        - $ref: "#/components/parameters/SortingOrder"
        - in: query
          name: sort-field
          schema:
            $ref: "#/components/schemas/TagSortableField"
          description: By which field results are sorted
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Tag'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
              examples:
                empty:
                  $ref: "#/components/examples/EmptyCollectionExample"
                collection:
                  $ref: "#/components/examples/TagsCollectionExample"
        '400':
          $ref: "#/components/responses/BadRequest"
        '405':
          $ref: "#/components/responses/MethodNotAllowed"
        '500':
          $ref: "#/components/responses/ServerError"

    post:
      tags:
        - Grouping
      summary: Create a tag
      operationId: createTag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagBody'
            examples:
              default:
                $ref: "#/components/examples/CreateTagExample"
      responses:
        '201':
          description: Resource created successfully
          headers:
            Location:
              schema:
                type: string
              description: URL of the created tag
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'
              examples:
                default:
                  $ref: "#/components/examples/TagExample"
        '400':
          $ref: "#/components/responses/BadRequest"
        '405':
          $ref: "#/components/responses/MethodNotAllowed"
        '500':
          $ref: "#/components/responses/ServerError"

  /grouping/tags/{tag_id}:
    get:
      tags:
        - Grouping
      summary: Get tag by id
      operationId: getTagById
      parameters:
        - in: path
          name: tag_id
          required: true
          schema:
            type: integer
            minimum: 1
          description: Id of the tag
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'
              examples:
                default:
                  $ref: "#/components/examples/TagExample"
        '400':
          $ref: "#/components/responses/BadRequest"
        '404':
          $ref: "#/components/responses/NotFound"
        '405':
          $ref: "#/components/responses/MethodNotAllowed"
        '500':
          $ref: "#/components/responses/ServerError"

    delete:
      tags:
        - Grouping
      summary: Remove the tag
      operationId: deleteTag
      parameters:
        - in: path
          name: tag_id
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '204':
          description: Resource removed successfully
        '400':
          $ref: "#/components/responses/BadRequest"
        '404':
          $ref: "#/components/responses/NotFound"
        '405':
          $ref: "#/components/responses/MethodNotAllowed"
        '500':
          $ref: "#/components/responses/ServerError"

  /scheduling/connectivity-test:
    post:
      tags:
        - Scheduling
      summary: Webhook for testing reachability of the service for cron
      operationId: schedulingConnectivityTest
      responses:
        '200':
          description: Connectivity test successfull
          content:
            application/json:
              schema:
                type: object
                required:
                  - ip
                  - scheme
                properties:
                  ip:
                    type: string
                  scheme:
                    type: string
                    enum: ['http', 'https']
              examples:
                default:
                  $ref: "#/components/examples/ConnectivityTestExample"
        '405':
          $ref: "#/components/responses/MethodNotAllowed"
        '500':
          $ref: "#/components/responses/ServerError"

  /scheduling/daily-cron-hook:
    post:
      tags:
        - Scheduling
      summary: Webhook for assigning daily tasks by cron
      operationId: schedulingDailyCronHook
      responses:
        '200':
          description: Daily tasks assigned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
              examples:
                default:
                  $ref: "#/components/examples/AssignedTasksExample"
        '405':
          $ref: "#/components/responses/MethodNotAllowed"
        '500':
          $ref: "#/components/responses/ServerError"

  /scheduling/weekly-cron-hook:
    post:
      tags:
        - Scheduling
      summary: Webhook for assigning weekly tasks by cron
      operationId: schedulingWeeklyCronHook
      responses:
        '200':
          description: Weekly tasks assigned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
              examples:
                default:
                  $ref: "#/components/examples/AssignedTasksExample"
        '405':
          $ref: "#/components/responses/MethodNotAllowed"
        '500':
          $ref: "#/components/responses/ServerError"

  /scheduling/monthly-cron-hook:
    post:
      tags:
        - Scheduling
      summary: Webhook for assigning monthly tasks by cron
      operationId: schedulingMonthlyCronHook
      responses:
        '200':
          description: Monthly tasks assigned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
              examples:
                default:
                  $ref: "#/components/examples/AssignedTasksExample"
        '405':
          $ref: "#/components/responses/MethodNotAllowed"
        '500':
          $ref: "#/components/responses/ServerError"

  /scheduling/calendar:
    get:
      tags:
        - Scheduling
      summary: Get calendar with tasks for selected period of time
      operationId: getCalendar
      parameters:
        - in: query
          name: from
          required: true
          schema:
            type: string
            format: date
          description: From which date to plan
        - in: query
          name: to
          required: true
          schema:
            type: string
            format: date
          description: To which date to plan
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Calendar'
              examples:
                default:
                  $ref: "#/components/examples/CalendarExample"
        '400':
          $ref: "#/components/responses/BadRequest"
        '405':
          $ref: "#/components/responses/MethodNotAllowed"
        '500':
          $ref: "#/components/responses/ServerError"

components:
  parameters:
    PaginationPage:
      in: query
      name: page
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number

    PaginationLimit:
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Maximum number of elements in returned collection

    SortingOrder:
      in: query
      name: sort
      schema:
        type: string
        enum: [asc, desc]
        default: asc
      description: By which order results are sorted

  schemas:
    Template:
      allOf:
        - $ref: "#/components/schemas/IdentifiableResource"
        - $ref: "#/components/schemas/TemplateBody"
    
    TemplateBody:
      type: object
      required:
        - name
        - starts_at
        - ends_at
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 64
          description: Name of the task template
          example: 123
        description:
          type: string
          minLength: 2
          description: Description of the task template
        tags:
          type: array
          items:
            type: integer
            minimum: 1
          description: List of tags ids assigned to the template
        starts_at:
          type: string
          format: time
          description: Time when task should be started
        ends_at:
          type: string
          format: time
          description: Time when task should be ended
        enabled:
          type: boolean
          default: true
          description: Whether to schedule new tasks or not
        scheduling:
          oneOf:
            - $ref: "#/components/schemas/TemplateDailyOptions"
            - $ref: "#/components/schemas/TemplateWeeklyOptions"
            - $ref: "#/components/schemas/TemplateMonthlyOptions"
            - $ref: "#/components/schemas/TemplateOneshotOptions"
            - $ref: "#/components/schemas/TemplateEvenDaysOptions"
            - $ref: "#/components/schemas/TemplateOddDaysOptions"
          discriminator:
            propertyName: type
            mapping:
              daily: "#/components/schemas/TemplateDailyOptions"
              weekly: "#/components/schemas/TemplateWeeklyOptions"
              monthly: "#/components/schemas/TemplateMonthlyOptions"
              oneshot: "#/components/schemas/TemplateOneshotOptions"
              even-days: "#/components/schemas/TemplateEvenDaysOptions"
              odd-days: "#/components/schemas/TemplateOddDaysOptions"

    TemplateDailyOptions:
      type: object
      properties:
        exclude:
          type: array
          items:
            oneOf:
              - $ref: "#/components/schemas/DayOfWeek"
              - $ref: "#/components/schemas/DayDateWithWildcards"

    TemplateWeeklyOptions: # even-days, even-weeks, even-months
      type: object
      required:
        - include
      properties:
        include:
          type: array
          items:
            $ref: "#/components/schemas/DayOfWeek"

    TemplateMonthlyOptions:
      type: object
      required:
        - include
      properties:
        include:
          type: array
          items:
            oneOf:
              - $ref: "#/components/schemas/DayOfWeek"
              - $ref: "#/components/schemas/DayOfMonth"

    TemplateOneshotOptions:
      type: object
      required:
        - include
      properties:
        include:
          type: array
          items:
            type: string
            format: date

    TemplateEvenDaysOptions:
      type: object
      properties:
        exclude:
          type: array
          items:
            oneOf:
              - $ref: "#/components/schemas/DayOfWeek"
              - $ref: "#/components/schemas/DayDateWithWildcards"

    TemplateOddDaysOptions:
      type: object
      properties:
        exclude:
          type: array
          items:
            oneOf:
              - $ref: "#/components/schemas/DayOfWeek"
              - $ref: "#/components/schemas/DayDateWithWildcards"

    TemplateSortableField:
      type: string
      enum: [id, name, description, starts_at, ends_at, enabled]
      default: id

    Task:
      allOf:
        - $ref: "#/components/schemas/IdentifiableResource"
        - $ref: "#/components/schemas/TaskBody"
    
    TaskBody:
      type: object
      required:
        - status
      properties:
        template_id:
          type: integer
          description: Id of the template from which task was created
          example: 3827
        moved_task_id:
          type: integer
          description: Id of the task from which this task was moved
          example: 8572
        status:
          type: string
          enum: ['pending', 'running', 'finished', 'cancelled', 'moved', 'overdue']
          description: Current state of the task
        notes:
          type: string
          minLength: 2
          description: Additional notes about the task
        date:
          type: string
          format: date
          description: Date that the task was assigned at
        started_at:
          type: string
          format: time
          description: Timestamp when task was started
        ended_at:
          type: string
          format: time
          description: Timestamp when task was ended
    
    RunningTaskBody:
      type: object
      required:
        - status
        - started_at
      properties:
        status:
          type: string
          const: 'running'
          description: Current state of the task (always 'running' in this case)
        started_at:
          type: string
          format: time
          description: Timestamp when task was started

    FinishedTaskBody:
      type: object
      required:
        - status
        - ended_at
      properties:
        status:
          type: string
          const: 'finished'
          description: Current state of the task (always 'finished' in this case)
        ended_at:
          type: string
          format: time
          description: Timestamp when task was ended

    CancelledTaskBody:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          const: 'cancelled'
          description: Current state of the task (always 'cancelled' in this case)

    MovedTaskBody:
      type: object
      required:
        - status
        - date
      properties:
        status:
          type: string
          const: 'moved'
          description: Current state of the task (always 'moved' in this case)
        date:
          type: string
          format: date
          description: Date that the task was assigned at

    TaskSortableField:
      type: string
      enum: [id, template_id, moved_task_id, status, notes, date, started_at, ended_at]
      default: id

    Tag:
      allOf:
        - $ref: "#/components/schemas/IdentifiableResource"
        - $ref: "#/components/schemas/TagBody"

    TagBody:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 64
          description: Name of the tag
          example: 123
        description:
          type: string
          minLength: 1
          description: Field to store some descriptive information that can be read by user to understand what this tag means
          example: 123
        deleted_at:
          type: string
          format: date-time
          description: Timestamp when tag was removed

    TagSortableField:
      type: string
      enum: [id, name, type]
      default: id

    Calendar:
      type: object
      required:
        - from
        - to
        - days
      properties:
        from:
          type: string
          format: date
        to:
          type: string
          format: date
        days:
          type: array
          items:
            $ref: "#/components/schemas/CalendarDay"

    CalendarDay:
      type: object
      required:
        - date
        - tasks
      properties:
        date:
          type: string
          format: date
        tasks:
          type: array
          items:
            oneOf:
              - $ref: "#/components/schemas/Task"
              - $ref: "#/components/schemas/TaskBody"

    PaginationMeta:
      type: object
      required:
        - total
        - page
        - limit
        - total_pages
      properties:
        total:
          type: integer
          description: Total number of elements
        page:
          type: integer
          description: Current page number
        limit:
          type: integer
          description: Maximum number of elements per page
        total_pages:
          type: integer
          description: Total number of available pages

    ErrorResponse:
      type: object
      required:
        - status
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string

    ValidationErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          properties:
            errors:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string
    
    DayOfWeek:
      type: string
      enum: ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday']
    
    DayOfMonth:
      type: integer
      minimum: 1
      maximum: 31

    DayDateWithWildcards:
      type: string
      description: Any other date in format DD-MM-YYYY with or without wildcards
      # examples:
      #   - summary: Specific day excluded
      #     value: 01-01-2026
      #     description: This method allows to exclude specific day at specific month at specific year
      #   - summary: Specific day excluded every year
      #     value: 01-01-*
      #     description: This method allows to exclude specific day at specific month every year
      #   - summary: Specific day excluded every month every year
      #     value: 01-*-*
      #     description: This method allows to exclude specific day every month every year
      #   - summary: Every day excluded at specific month every year
      #     value: *-01-*
      #     description: This method allows to exclude every day at specific month every year

    IdentifiableResource:
      type: object
      required:
        - id
      properties:
        id:
